<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="查詢寶可夢屬性弱點、建立隊伍並取得對戰建議"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Pokex — 寶可夢屬性相剋查詢</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        font-size: 16px;
        min-height: 100vh;
      }

      .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      h1 {
        text-align: center;
        font-size: 1.4rem;
        margin-bottom: 6px;
        color: #fff;
      }

      .subtitle {
        text-align: center;
        font-size: 0.85rem;
        color: #888;
        margin-bottom: 20px;
      }

      .section-label {
        font-size: 0.9rem;
        color: #aaa;
        margin-bottom: 10px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        background: #0f3460;
        border-radius: 12px;
        padding: 4px;
      }

      .tab-btn {
        flex: 1;
        min-height: 42px;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: #8899aa;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
      }

      .tab-btn.active {
        background: #e63946;
        color: #fff;
      }

      /* Type Grid */
      .type-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      .type-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border: 2px solid transparent;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.1s,
          border-color 0.15s,
          opacity 0.15s;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      .type-btn:active {
        transform: scale(0.95);
      }
      .type-btn.selected {
        border-color: #fff;
        transform: scale(1.05);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
      }
      .type-btn.disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .selected-display {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .selected-display .placeholder {
        color: #666;
        font-size: 0.9rem;
      }

      .selected-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }

      .selected-tag .remove {
        cursor: pointer;
        margin-left: 4px;
        font-size: 1.1rem;
        opacity: 0.7;
      }
      .selected-tag .remove:hover {
        opacity: 1;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
      }

      .btn-query,
      .btn-clear,
      .btn-add-member {
        flex: 1;
        min-height: 46px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn-query {
        background: #e63946;
        color: #fff;
      }
      .btn-query:disabled {
        background: #555;
        cursor: default;
      }
      .btn-clear {
        background: #333;
        color: #ccc;
      }
      .btn-add-member {
        background: #2d6a4f;
        color: #fff;
      }
      .btn-add-member:disabled {
        background: #555;
        cursor: default;
      }

      .results {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .card {
        border-radius: 12px;
        padding: 16px;
        background: #16213e;
      }

      .card h2 {
        font-size: 1rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .card.weakness h2 {
        color: #ff6b6b;
      }
      .card.resist h2 {
        color: #51cf66;
      }
      .card.immune h2 {
        color: #adb5bd;
      }
      .card.advice h2 {
        color: #ffd43b;
      }

      .card .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }

      .tag .mult {
        margin-left: 4px;
        font-size: 0.75rem;
        opacity: 0.85;
      }

      .card .empty {
        color: #555;
        font-size: 0.9rem;
      }

      /* Team Section */
      .team-panel {
        display: none;
      }
      .team-panel.active {
        display: block;
      }
      .query-panel {
        display: none;
      }
      .query-panel.active {
        display: block;
      }

      .team-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
      }

      .team-tab {
        flex: 1;
        min-height: 40px;
        border: 2px solid #334;
        border-radius: 10px;
        background: transparent;
        color: #aaa;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        -webkit-tap-highlight-color: transparent;
      }

      .team-tab.active {
        border-color: #ffd43b;
        color: #ffd43b;
        background: rgba(255, 212, 59, 0.1);
      }

      .team-members {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .team-member {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #16213e;
        border-radius: 10px;
        padding: 10px 14px;
        min-height: 44px;
      }

      .team-member .member-info {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .team-member .member-name {
        font-size: 1.05rem;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .team-member .member-types {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .team-member .remove-member {
        background: none;
        border: none;
        color: #e63946;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 0 4px;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .team-member-empty {
        background: #16213e;
        border: 2px dashed #334;
        border-radius: 10px;
        padding: 10px 14px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #445;
        font-size: 0.85rem;
      }

      /* Collapsible section */
      .collapse-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        margin-bottom: 10px;
        -webkit-tap-highlight-color: transparent;
      }
      .collapse-arrow {
        font-size: 0.7rem;
        color: #888;
        transition: transform 0.2s;
      }
      .collapse-arrow.collapsed {
        transform: rotate(-90deg);
      }
      #addSectionBody {
        overflow: hidden;
        transition: max-height 0.3s ease, opacity 0.2s ease;
      }
      #addSectionBody.collapsed,
      #manualTypeBody.collapsed {
        max-height: 0 !important;
        opacity: 0;
        pointer-events: none;
      }

      /* Stats panel (expandable) */
      .team-member { cursor: pointer; }
      .member-stats-panel {
        display: none;
        width: 100%;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid #334;
      }
      .member-stats-panel.show { display: block; }
      .stats-total {
        font-size: 0.88rem;
        color: #aaa;
        margin-bottom: 4px;
      }
      .stat-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 3px;
        font-size: 0.82rem;
      }
      .stat-label {
        width: 28px;
        text-align: right;
        color: #999;
        flex-shrink: 0;
      }
      .stat-val {
        width: 26px;
        text-align: right;
        color: #ddd;
        font-weight: 600;
        flex-shrink: 0;
      }
      .stat-bar {
        flex: 1;
        height: 10px;
        background: #223;
        border-radius: 4px;
        overflow: hidden;
      }
      .stat-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      .member-defense {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 4px;
      }
      .member-defense .def-label {
        font-size: 0.78rem;
        color: #888;
        margin-right: 2px;
      }
      .member-defense .def-tag {
        font-size: 0.75rem;
        padding: 1px 4px;
        border-radius: 3px;
        color: #fff;
        line-height: 1.3;
        white-space: nowrap;
      }

      .team-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }

      .btn-analyze {
        flex: 1;
        min-height: 46px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        background: #ffd43b;
        color: #1a1a2e;
      }
      .btn-analyze:disabled {
        background: #555;
        color: #888;
        cursor: default;
      }

      .btn-clear-team {
        flex: 1;
        min-height: 46px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        background: #333;
        color: #ccc;
      }

      .team-results {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .name-input-wrapper {
        position: relative;
        margin-bottom: 14px;
      }

      .name-input-wrapper .name-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
        pointer-events: none;
      }

      .name-input {
        width: 100%;
        padding: 12px 14px 12px 40px;
        border: 2px solid #445;
        border-radius: 12px;
        background: #0f3460;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .name-input:focus {
        border-color: #ffd43b;
        box-shadow: 0 0 0 3px rgba(255, 212, 59, 0.15);
      }
      .name-input::placeholder {
        color: #667;
        font-weight: 400;
      }

      /* Autocomplete dropdown */
      .autocomplete-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 100;
        background: #16213e;
        border: 2px solid #445;
        border-top: none;
        border-radius: 0 0 12px 12px;
        max-height: 240px;
        overflow-y: auto;
        display: none;
      }
      .autocomplete-list.show { display: block; }
      .autocomplete-item {
        padding: 10px 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        border-bottom: 1px solid #223;
      }
      .autocomplete-item:last-child { border-bottom: none; }
      .autocomplete-item:hover,
      .autocomplete-item.active {
        background: #0f3460;
      }
      .autocomplete-item .ac-name {
        color: #fff;
        font-weight: 600;
      }
      .autocomplete-item .ac-name-en {
        color: #888;
        font-size: 0.78rem;
      }
      .autocomplete-item .ac-types {
        margin-left: auto;
        display: flex;
        gap: 4px;
      }
      .autocomplete-item .ac-type-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }

      /* Opponent matchup section */
      .opponent-section {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #223;
      }

      .opponent-section h3 {
        font-size: 0.95rem;
        color: #ff6b6b;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .opponent-selected {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .opponent-selected .placeholder {
        color: #556;
        font-size: 0.85rem;
      }

      .btn-clear-opponent {
        min-height: 36px;
        padding: 0 16px;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        background: #333;
        color: #aaa;
        margin-bottom: 14px;
      }

      .matchup-result {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .matchup-member {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
        padding: 12px;
      }

      .matchup-member-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .matchup-member-name {
        font-weight: 600;
        font-size: 0.9rem;
        color: #fff;
      }

      .matchup-badge {
        font-size: 0.78rem;
        font-weight: 700;
        padding: 2px 10px;
        border-radius: 20px;
      }

      .matchup-badge.great {
        background: #2d6a4f;
        color: #51cf66;
      }
      .matchup-badge.ok {
        background: #5c4d1a;
        color: #ffd43b;
      }
      .matchup-badge.bad {
        background: #6b2020;
        color: #ff6b6b;
      }
      .matchup-badge.immune-badge {
        background: #333;
        color: #adb5bd;
      }

      .matchup-detail {
        font-size: 0.82rem;
        color: #aaa;
        line-height: 1.6;
      }

      .matchup-recommend {
        margin-top: 10px;
        padding: 10px 12px;
        background: rgba(255, 212, 59, 0.08);
        border-radius: 8px;
        border-left: 3px solid #ffd43b;
      }

      .matchup-recommend-title {
        font-size: 0.82rem;
        font-weight: 600;
        color: #ffd43b;
        margin-bottom: 6px;
      }

      /* Threat scenario */
      .threat-scenario {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }

      .threat-scenario:last-child {
        margin-bottom: 0;
      }

      .threat-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .threat-header .threat-type-label {
        font-weight: 700;
      }

      .threat-affected {
        font-size: 0.82rem;
        color: #ff9999;
        margin-bottom: 6px;
        line-height: 1.5;
      }

      .threat-counter {
        font-size: 0.82rem;
        color: #aaa;
        margin-bottom: 4px;
      }

      .divider {
        border: none;
        border-top: 1px solid #223;
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>寶可夢屬性相剋查詢</h1>
      <p class="subtitle">查詢屬性弱點，或建立隊伍分析攻略</p>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('query')">
          屬性查詢
        </button>
        <button class="tab-btn" onclick="switchTab('team')">我的隊伍</button>
      </div>

      <!-- Query Panel -->
      <div class="query-panel active" id="queryPanel">
        <p class="section-label">選擇屬性（最多 2 個）</p>
        <div class="type-grid" id="typeGrid"></div>

        <div class="selected-display" id="selectedDisplay">
          <span class="placeholder">尚未選擇屬性</span>
        </div>

        <div class="actions">
          <button class="btn-clear" id="btnClear" style="display: none">
            清除
          </button>
        </div>

        <div class="results" id="results"></div>
      </div>

      <!-- Team Panel -->
      <div class="team-panel" id="teamPanel">
        <div class="team-tabs" id="teamTabs"></div>

        <div style="display: flex; gap: 8px; margin-bottom: 16px">
          <button
            class="btn-clear"
            id="btnExportTeam"
            style="flex: 1; font-size: 0.85rem; min-height: 36px"
          >
            📋 複製隊伍
          </button>
          <button
            class="btn-clear"
            id="btnImportTeam"
            style="flex: 1; font-size: 0.85rem; min-height: 36px"
          >
            📥 匯入隊伍
          </button>
        </div>

        <p class="section-label">隊伍成員（最多 4 隻）</p>
        <div class="team-members" id="teamMembers"></div>

        <div id="teamAddSection">
          <div class="collapse-toggle" id="toggleAddSection" onclick="toggleAddPanel()">
            <span class="collapse-arrow" id="addSectionArrow">&#9660;</span>
            <p class="section-label" style="margin-bottom:0;cursor:pointer">新增成員</p>
          </div>
          <div id="addSectionBody">
          <div class="name-input-wrapper">
            <span class="name-icon">🔍</span>
            <input
              type="text"
              class="name-input"
              id="memberNameInput"
              placeholder="搜尋寶可夢（中文/英文/編號）"
              maxlength="40"
              autocomplete="off"
            />
            <div class="autocomplete-list" id="autocompleteList"></div>
          </div>

          <div class="actions">
            <button class="btn-add-member" id="btnAddMember" disabled>
              加入隊伍
            </button>
            <button class="btn-clear" id="btnTeamClearSel">清除選擇</button>
          </div>

          <p class="section-label">選擇屬性（最多 2 個）</p>
          <div class="type-grid" id="teamTypeGrid"></div>

          <div class="selected-display" id="teamSelectedDisplay">
            <span class="placeholder">尚未選擇屬性</span>
          </div>

          <div
            id="teamMovesSection"
            style="display: none"
          >
            <p class="section-label" style="margin-top: 14px">
              選擇攻擊招式屬性（最多 4 個）
            </p>
            <div class="type-grid" id="teamMovesGrid"></div>
            <div class="selected-display" id="teamMovesDisplay">
              <span class="placeholder">選擇已學招式</span>
            </div>
          </div>
          </div>
        </div>

        <hr class="divider" />

        <div class="team-actions">
          <button class="btn-analyze" id="btnAnalyze" disabled>
            分析隊伍弱點與攻略
          </button>
          <button class="btn-clear-team" id="btnClearTeam">清空隊伍</button>
        </div>

        <div class="team-results" id="teamResults"></div>

        <div
          class="opponent-section"
          id="opponentSection"
        >
          <h3>🎯 即時對手分析</h3>
          <p class="section-label">搜尋對手寶可夢</p>
          <div class="name-input-wrapper">
            <span class="name-icon">🔍</span>
            <input
              type="text"
              class="name-input"
              id="opponentNameInput"
              placeholder="搜尋對手（中文/英文/編號）"
              maxlength="40"
              autocomplete="off"
            />
            <div class="autocomplete-list" id="opponentAutocompleteList"></div>
          </div>
          <div id="opponentCard" style="display:none"></div>
          <div class="collapse-toggle" onclick="toggleManualType()">
            <span class="collapse-arrow collapsed" id="manualTypeArrow">&#9660;</span>
            <p class="section-label" style="margin-bottom:0;cursor:pointer">或手動選擇屬性（最多 2 個）</p>
          </div>
          <div id="manualTypeBody" class="collapsed" style="overflow:hidden;transition:max-height 0.3s ease,opacity 0.2s ease">
            <div class="type-grid" id="opponentTypeGrid"></div>
            <div class="opponent-selected" id="opponentSelectedDisplay">
              <span class="placeholder">點選對手的屬性</span>
            </div>
          </div>
          <button class="btn-clear-opponent" id="btnClearOpponent">
            清除對手
          </button>
          <div class="matchup-result" id="matchupResult"></div>
        </div>
      </div>
    </div>

    <script src="data/champions-pokemon.js"></script>
    <script>
      const TYPES = [
        { id: "normal", name: "一般", color: "#A8A77A" },
        { id: "fire", name: "火", color: "#EE8130" },
        { id: "water", name: "水", color: "#6390F0" },
        { id: "electric", name: "電", color: "#F7D02C" },
        { id: "grass", name: "草", color: "#7AC74C" },
        { id: "ice", name: "冰", color: "#96D9D6" },
        { id: "fighting", name: "格鬥", color: "#C22E28" },
        { id: "poison", name: "毒", color: "#A33EA1" },
        { id: "ground", name: "地面", color: "#E2BF65" },
        { id: "flying", name: "飛行", color: "#A98FF3" },
        { id: "psychic", name: "超能力", color: "#F95587" },

      function loadTeams() {
        try {
          const saved = localStorage.getItem("poke-teams");
          if (saved) {
            const parsed = JSON.parse(saved);
            teams = parsed.map((team) =>
              team.map((member) => {
                if (Array.isArray(member)) {
                  return { name: "", types: member, moves: [] };
                } else if (!member.moves) {
                  return { ...member, moves: [] };
                }
                return member;
              }),
            );
          }
        } catch (e) {}
      }


      function saveTeams() {
        localStorage.setItem("poke-teams", JSON.stringify(teams));
      }

      function exportTeamJSON() {
        const team = teams[currentTeamIdx];
        if (team.length === 0) {
          alert("隊伍為空！");
          return;
        }
        const json = JSON.stringify(team, null, 2);
        navigator.clipboard
          .writeText(json)
          .then(() => alert("✅ 隊伍已複製到剪貼簿！"))
          .catch(() => {
            const textarea = document.createElement("textarea");
            textarea.value = json;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            alert("✅ 隊伍已複製到剪貼簿！");
          });
      }

      function importTeamJSON() {
        const json = prompt("貼上隊伍 JSON 資料：");
        if (!json) return;
        try {
          const imported = JSON.parse(json);
          if (!Array.isArray(imported)) throw new Error("必須是陣列");
          const validTypeIds = TYPES.map((t) => t.id);
          const validated = imported.map((m) => {
            const entry = {
              name: m.name || "",
              types: (m.types || []).filter((t) => validTypeIds.includes(t)),
              moves: (m.moves || []).filter((t) => validTypeIds.includes(t)),
            };
            if (m.stats) entry.stats = m.stats;
            // Try to restore stats from Champions data if missing
            if (!entry.stats && entry.name && typeof CHAMPIONS_DATA !== "undefined") {
              const match = CHAMPIONS_DATA.pokemon.find((p) =>
                p.nameTW === entry.name || p.name.toLowerCase() === entry.name.toLowerCase()
              );
              if (match) entry.stats = match.stats;
            }
            return entry;
          });
          teams[currentTeamIdx] = validated;
          saveTeams();
          teamSelected = [];
          teamMoves = [];
          opponentSelected = [];
          document.getElementById("memberNameInput").value = "";
          document.getElementById("teamResults").innerHTML = "";
          document.getElementById("matchupResult").innerHTML = "";
          renderTeam();
          alert("✅ 隊伍已導入！");
        } catch (e) {
          alert("❌ JSON 格式錯誤：" + e.message);
        }
      }

        const typesStr = member.types.map((id) => typeMap[id].name).join("/");
        const movesStr =
          member.moves && member.moves.length > 0
            ? " [招式: " +
              member.moves.map((id) => typeMap[id].name).join("/") +
              "]"
            : "";
        return member.name
          ? `${member.name}（${typesStr}）${movesStr}`
          : typesStr;

      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-btn").forEach((btn, i) => {
          btn.classList.toggle(
            "active",
            (i === 0 && tab === "query") || (i === 1 && tab === "team"),
          );
        });
        document
          .getElementById("queryPanel")
          .classList.toggle("active", tab === "query");
        document
          .getElementById("teamPanel")
          .classList.toggle("active", tab === "team");
        if (tab === "query") render();
        else renderTeam();

      // ===== Query Panel =====
      function render() {
        const grid = document.getElementById("typeGrid");
        grid.innerHTML = "";
        TYPES.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = "type-btn";
          if (selected.includes(t.id)) btn.classList.add("selected");
          else if (selected.length >= 2) btn.classList.add("disabled");
          btn.style.background = t.color;
          btn.textContent = t.name;
          btn.onclick = () => {
            toggle(t.id);
          };
          grid.appendChild(btn);
        });

        const display = document.getElementById("selectedDisplay");
        if (selected.length === 0) {
          display.innerHTML = '<span class="placeholder">尚未選擇屬性</span>';
          document.getElementById("results").innerHTML = "";
        } else {
          display.innerHTML = selected
            .map((id) => {
              const t = typeMap[id];
              return `<span class="selected-tag" style="background:${t.color}">${t.name}<span class="remove" onclick="toggle('${id}')">&times;</span></span>`;
            })
            .join("");
          query();
        }
        document.getElementById("btnClear").style.display =
          selected.length > 0 ? "" : "none";
      }

      function toggle(id) {
        const i = selected.indexOf(id);
        if (i >= 0) selected.splice(i, 1);
        else if (selected.length < 2) selected.push(id);
        render();
      }

      function calcDefenseMultipliers(typeIds) {
        const multipliers = {};
        TYPES.forEach((atk) => {
          let mult = 1;
          typeIds.forEach((defId) => {
            const defTable = DEFENSE[defId] || {};
            mult *= defTable[atk.id] !== undefined ? defTable[atk.id] : 1;
          });
          multipliers[atk.id] = mult;
        });
        return multipliers;
      }

      function makeTagHtml(id, label) {
        const t = typeMap[id];
        return `<span class="tag" style="background:${t.color}">${t.name}${label ? `<span class="mult">${label}</span>` : ""}</span>`;
      }

      function makeCard(title, emoji, cls, groups) {
        const allEmpty = groups.every((g) => g.ids.length === 0);
        let tagsHtml = "";
        if (allEmpty) {
          tagsHtml = '<span class="empty">無</span>';
        } else {
          tagsHtml =
            '<div class="tags">' +
            groups
              .flatMap((g) => g.ids.map((id) => makeTagHtml(id, g.label)))
              .join("") +
            "</div>";
        }
        return `<div class="card ${cls}"><h2>${emoji} ${title}</h2>${tagsHtml}</div>`;
      }

      function query() {
        if (selected.length === 0) return;
        const multipliers = calcDefenseMultipliers(selected);
        const weakness4x = [],
          weakness2x = [],
          resist05 = [],
          resist025 = [],
          immune = [];

        TYPES.forEach((t) => {
          const m = multipliers[t.id];
          if (m === 0) immune.push(t.id);
          else if (m === 4) weakness4x.push(t.id);
          else if (m === 2) weakness2x.push(t.id);
          else if (m === 0.5) resist05.push(t.id);
          else if (m === 0.25) resist025.push(t.id);
        });

        document.getElementById("results").innerHTML =
          makeCard("弱點", "🔥", "weakness", [
            { ids: weakness4x, label: "×4" },
            { ids: weakness2x, label: "×2" },
          ]) +
          makeCard("抵抗", "🛡️", "resist", [
            { ids: resist025, label: "×¼" },
            { ids: resist05, label: "×½" },
          ]) +
          makeCard("免疫", "🚫", "immune", [{ ids: immune, label: "×0" }]);
      }

      document.getElementById("btnClear").onclick = () => {
        selected = [];
        render();
      };

      // ===== Team Panel =====
      function renderTeam() {
        const team = teams[currentTeamIdx];

        // Team tabs
        const tabsEl = document.getElementById("teamTabs");
        tabsEl.innerHTML = "";
        for (let i = 0; i < 3; i++) {
          const btn = document.createElement("button");
          btn.className = "team-tab" + (i === currentTeamIdx ? " active" : "");
          btn.textContent =
            `隊伍 ${i + 1}` +
            (teams[i].length > 0 ? ` (${teams[i].length})` : "");
          btn.onclick = () => {
            currentTeamIdx = i;
            teamSelected = [];
            teamMoves = [];
            document.getElementById("memberNameInput").value = "";
            renderTeam();
          };
          tabsEl.appendChild(btn);
        }

        // Members
        const membersEl = document.getElementById("teamMembers");
        membersEl.innerHTML = "";
        for (let i = 0; i < 4; i++) {
          if (i < team.length) {
            const member = team[i];
            const div = document.createElement("div");
            div.className = "team-member";
            const nameHtml = member.name
              ? `<span class="member-name">${member.name}</span>`
              : "";

            // Calculate defense multipliers
            const mult = calcDefenseMultipliers(member.types);
            const weak4x = [], weak2x = [], resist05 = [], resist025 = [], immune = [];
            TYPES.forEach((t) => {
              const m = mult[t.id];
              if (m === 0) immune.push(t.id);
              else if (m >= 4) weak4x.push(t.id);
              else if (m >= 2) weak2x.push(t.id);
              else if (m <= 0.25) resist025.push(t.id);
              else if (m <= 0.5) resist05.push(t.id);
            });

            const defTag = (id, label) => `<span class="def-tag" style="background:${typeMap[id].color}">${typeMap[id].name}${label}</span>`;
            let defHtml = "";
            if (weak4x.length + weak2x.length > 0) {
              defHtml += `<div class="member-defense"><span class="def-label">弱</span>${weak4x.map(id => defTag(id, "x4")).join("")}${weak2x.map(id => defTag(id, "x2")).join("")}</div>`;
            }
            if (resist025.length + resist05.length > 0) {
              defHtml += `<div class="member-defense"><span class="def-label">抗</span>${resist025.map(id => defTag(id, "x¼")).join("")}${resist05.map(id => defTag(id, "x½")).join("")}</div>`;
            }
            if (immune.length > 0) {
              defHtml += `<div class="member-defense"><span class="def-label">免</span>${immune.map(id => defTag(id, "x0")).join("")}</div>`;
            }

            // Stats panel HTML
            let statsHtml = "";
            if (member.stats) {
              const s = member.stats;
              const statColor = (v) => v >= 100 ? "#51cf66" : v >= 60 ? "#ffd43b" : "#ff6b6b";
              const statBar = (label, val) =>
                `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-val">${val}</span><div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.min(val / 255 * 100, 100).toFixed(1)}%;background:${statColor(val)}"></div></div></div>`;
              statsHtml = `<div class="member-stats-panel" id="statsPanel${i}">
                <div class="stats-total">種族值 ${s.total}</div>
                ${statBar("HP", s.hp)}${statBar("攻擊", s.atk)}${statBar("防禦", s.def)}${statBar("特攻", s.spa)}${statBar("特防", s.spd)}${statBar("速度", s.spe)}
              </div>`;
            }

            div.innerHTML = `
        <div class="member-info" style="flex-direction:column;align-items:flex-start;gap:4px;flex:1;min-width:0" onclick="toggleStats(${i})">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            ${nameHtml}
            <div class="member-types" style="margin-left:auto">
              ${member.types.map((id) => `<span class="tag" style="background:${typeMap[id].color}">${typeMap[id].name}</span>`).join("")}
            </div>
          </div>
          ${defHtml}
          ${statsHtml}
        </div>
        <button class="remove-member" onclick="event.stopPropagation();removeMember(${i})">&times;</button>
      `;
            membersEl.appendChild(div);
          } else {
            const div = document.createElement("div");
            div.className = "team-member-empty";
            div.textContent = `空位 #${i + 1}`;
            membersEl.appendChild(div);
          }
        }

        // Hide add section if full
        const isFull = team.length >= 4;
        document.getElementById("teamAddSection").style.display = isFull
          ? "none"
          : "";

        if (!isFull) {
          const grid = document.getElementById("teamTypeGrid");
          grid.innerHTML = "";
          TYPES.forEach((t) => {
            const btn = document.createElement("button");
            btn.className = "type-btn";
            if (teamSelected.includes(t.id)) btn.classList.add("selected");
            else if (teamSelected.length >= 2) btn.classList.add("disabled");
            btn.style.background = t.color;
            btn.textContent = t.name;
            btn.onclick = () => teamToggle(t.id);
            grid.appendChild(btn);
          });

          const display = document.getElementById("teamSelectedDisplay");
          if (teamSelected.length === 0) {
            display.innerHTML =
              '<span class="placeholder">選擇新成員的屬性</span>';
          } else {
            display.innerHTML = teamSelected
              .map((id) => {
                const t = typeMap[id];
                return `<span class="selected-tag" style="background:${t.color}">${t.name}<span class="remove" onclick="teamToggle('${id}')">&times;</span></span>`;
              })
              .join("");
          }
          document.getElementById("btnAddMember").disabled =
            teamSelected.length === 0;

          // Show/hide moves section
          const movesSection = document.getElementById("teamMovesSection");
          if (teamSelected.length > 0) {
            movesSection.style.display = "";
            renderTeamMoves();
          } else {
            movesSection.style.display = "none";
            teamMoves = [];
          }
        }

        document.getElementById("btnAnalyze").disabled = team.length === 0;
        showOpponentSection();
      }

      function renderTeamMoves() {
        const grid = document.getElementById("teamMovesGrid");
        grid.innerHTML = "";
        TYPES.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = "type-btn";
          if (teamMoves.includes(t.id)) btn.classList.add("selected");
          else if (teamMoves.length >= 4) btn.classList.add("disabled");
          btn.style.background = t.color;
          btn.textContent = t.name;
          btn.onclick = () => teamMoveToggle(t.id);
          grid.appendChild(btn);
        });

        const display = document.getElementById("teamMovesDisplay");
        if (teamMoves.length === 0) {
          display.innerHTML = '<span class="placeholder">選擇已學招式</span>';
        } else {
          display.innerHTML = teamMoves
            .map((id) => {
              const t = typeMap[id];
              return `<span class="selected-tag" style="background:${t.color}">${t.name}<span class="remove" onclick="teamMoveToggle('${id}')">&times;</span></span>`;
            })
            .join("");
        }
      }

      function teamToggle(id) {
        const i = teamSelected.indexOf(id);
        if (i >= 0) teamSelected.splice(i, 1);
        else if (teamSelected.length < 2) teamSelected.push(id);
        teamMoves = [];
        renderTeam();
      }

      function teamMoveToggle(id) {
        const i = teamMoves.indexOf(id);
        if (i >= 0) teamMoves.splice(i, 1);
        else if (teamMoves.length < 4) teamMoves.push(id);
        renderTeamMoves();
      }

      function addMember() {
        if (teamSelected.length === 0) return;
        const team = teams[currentTeamIdx];
        if (team.length >= 4) return;
        const nameInput = document.getElementById("memberNameInput");
        const name = nameInput.value.trim();
        const memberData = { name, types: [...teamSelected], moves: [...teamMoves] };
        if (pendingStats) memberData.stats = pendingStats;
        team.push(memberData);
        teamSelected = [];
        teamMoves = [];
        pendingStats = null;
        nameInput.value = "";
        saveTeams();
        renderTeam();
      }

      function removeMember(idx) {
        teams[currentTeamIdx].splice(idx, 1);
        saveTeams();
        document.getElementById("teamResults").innerHTML = "";
        renderTeam();
      }

      function clearTeam() {
        teams[currentTeamIdx] = [];
        teamSelected = [];
        teamMoves = [];
        document.getElementById("memberNameInput").value = "";
        saveTeams();
        document.getElementById("teamResults").innerHTML = "";
        renderTeam();
      }

      function analyzeTeam() {
        const team = teams[currentTeamIdx];
        if (team.length === 0) return;

        // Per-member analysis
        const memberData = team.map((member, idx) => {
          const mult = calcDefenseMultipliers(member.types);
          const weaknesses = {}; // typeId -> multiplier
          TYPES.forEach((t) => {
            if (mult[t.id] > 1) weaknesses[t.id] = mult[t.id];
          });
          return { member, mult, weaknesses, idx };
        });

        // Count how many members are weak to each type
        const teamWeakCount = {};
        TYPES.forEach((t) => {
          teamWeakCount[t.id] = 0;
        });
        memberData.forEach((m) => {
          Object.keys(m.weaknesses).forEach((id) => teamWeakCount[id]++);
        });

        // Threat types sorted by danger level
        const threatTypes = TYPES.map((t) => t.id)
          .filter((id) => teamWeakCount[id] > 0)
          .sort((a, b) => teamWeakCount[b] - teamWeakCount[a]);

        let html = "";

        // === Card 1: Threat summary (compact) ===
        const majorThreats = threatTypes.filter((id) => teamWeakCount[id] >= 2);
        if (majorThreats.length > 0) {
          html += `<div class="card advice"><h2>⚠️ 共同弱點</h2>
            <div style="font-size:0.85rem;color:#ff6b6b;margin-bottom:6px">以下屬性威脅 2 隻以上隊員：</div>
            <div class="tags">${majorThreats.map((id) => makeTagHtml(id, `${teamWeakCount[id]}隻`)).join("")}</div>
          </div>`;
        }

        // === Card 3: Recommended types to have on your team ===
        const counterCoverage = {};
        TYPES.forEach((counterType) => {
          let score = 0;
          threatTypes.forEach((threatId) => {
            const off = OFFENSE[counterType.id] || {};
            if (off[threatId] >= 2) score += teamWeakCount[threatId]; // weighted by danger
          });
          counterCoverage[counterType.id] = score;
        });

        const topCounters = TYPES.map((t) => t.id)
          .filter((id) => counterCoverage[id] > 0)
          .sort((a, b) => counterCoverage[b] - counterCoverage[a])
          .slice(0, 6);

        if (topCounters.length > 0) {
          html += `<div class="card advice"><h2>🎯 推薦攜帶的招式屬性</h2>
      <div style="font-size:0.82rem;color:#aaa;margin-bottom:8px">確保隊伍中有這些屬性的招式，可以有效應對大部分威脅：</div>
      <div class="tags">${topCounters.map((id) => makeTagHtml(id, "")).join("")}</div>
    </div>`;
        }

        // === Card 4: Attack coverage blind spots ===
        const uncovered = []; // types no member can hit SE
        const partiallyCovered = []; // types only 1 member can hit SE

        TYPES.forEach((defType) => {
          let coverCount = 0;
          team.forEach((member) => {
            // Use moves if set, otherwise fallback to own types (STAB)
            const atkTypes = member.moves && member.moves.length > 0 ? member.moves : member.types;
            const canHitSE = atkTypes.some((atkId) => {
              const off = OFFENSE[atkId] || {};
              return off[defType.id] >= 2;
            });
            if (canHitSE) coverCount++;
          });
          if (coverCount === 0) uncovered.push(defType.id);
          else if (coverCount === 1) partiallyCovered.push(defType.id);
        });

        if (uncovered.length > 0 || partiallyCovered.length > 0) {
          html += `<div class="card weakness"><h2>🚨 攻擊覆蓋盲點</h2>`;
          if (uncovered.length > 0) {
            html += `<div style="font-size:0.85rem;color:#ff6b6b;font-weight:600;margin-bottom:6px">無法應對的屬性（沒有隊員能打出超效傷害）：</div>`;
            html += `<div class="tags" style="margin-bottom:10px">${uncovered.map((id) => makeTagHtml(id, "")).join("")}</div>`;
          }
          if (partiallyCovered.length > 0) {
            html += `<div style="font-size:0.85rem;color:#ffd43b;margin-bottom:6px">僅 1 位隊員能應對的屬性（覆蓋薄弱）：</div>`;
            html += `<div class="tags">${partiallyCovered.map((id) => makeTagHtml(id, "")).join("")}</div>`;
          }
          html += `</div>`;
        } else {
          html += `<div class="card resist"><h2>✅ 攻擊覆蓋完整</h2>
            <div style="font-size:0.85rem;color:#51cf66">隊伍的招式屬性能超效應對全部 18 種屬性！</div>
          </div>`;
        }

        document.getElementById("teamResults").innerHTML = html;
      }

      // ===== Opponent Matchup =====
      let opponentSelected = [];

      function showOpponentSection() {
        const team = teams[currentTeamIdx];
        const section = document.getElementById("opponentSection");
        section.style.display = team.length > 0 ? "" : "none";
      }

      function renderOpponent() {
        const grid = document.getElementById("opponentTypeGrid");
        grid.innerHTML = "";
        TYPES.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = "type-btn";
          if (opponentSelected.includes(t.id)) btn.classList.add("selected");
          else if (opponentSelected.length >= 2) btn.classList.add("disabled");
          btn.style.background = t.color;
          btn.textContent = t.name;
          btn.onclick = () => opponentToggle(t.id);
          grid.appendChild(btn);
        });

        const display = document.getElementById("opponentSelectedDisplay");
        if (opponentSelected.length === 0) {
          display.innerHTML = '<span class="placeholder">點選對手的屬性</span>';
        } else {
          display.innerHTML = opponentSelected
            .map((id) => {
              const t = typeMap[id];
              return `<span class="selected-tag" style="background:${t.color}">${t.name}<span class="remove" onclick="opponentToggle('${id}')">&times;</span></span>`;
            })
            .join("");
        }

        if (opponentSelected.length > 0) {
          renderMatchup();
        } else {
          document.getElementById("matchupResult").innerHTML = "";
        }
      }

      function opponentToggle(id) {
        const i = opponentSelected.indexOf(id);
        if (i >= 0) opponentSelected.splice(i, 1);
        else if (opponentSelected.length < 2) opponentSelected.push(id);
        renderOpponent();
      }

      function renderMatchup() {
        const team = teams[currentTeamIdx];
        const oppTypes = opponentSelected;
        const oppLabel = oppTypes.map((id) => typeMap[id].name).join("/");

        // For each team member, calculate:
        // 1. How much damage opponent deals to member (defense matchup)
        // 2. How much damage member deals to opponent (offense matchup — best of member's types)
        const results = team.map((member) => {
          // Defense: opponent attacks member
          const defMult = calcDefenseMultipliers(member.types);
          // Opponent can use STAB moves of their types — pick the best one
          let worstDamageTaken = 0;
          oppTypes.forEach((oppType) => {
            if (defMult[oppType] > worstDamageTaken)
              worstDamageTaken = defMult[oppType];
          });

          // Offense: member attacks opponent
          const oppDefMult = calcDefenseMultipliers(oppTypes);
          let bestDamageDealt = 0;
          let bestAtkType = null;
          member.types.forEach((myType) => {
            if (oppDefMult[myType] > bestDamageDealt) {
              bestDamageDealt = oppDefMult[myType];
              bestAtkType = myType;
            }
          });

          return { member, worstDamageTaken, bestDamageDealt, bestAtkType };
        });

        // Sort: best matchups first (deal most damage, take least)
        const sorted = [...results].sort((a, b) => {
          // Prioritize: can deal SE damage AND doesn't take SE damage
          const scoreA = a.bestDamageDealt - a.worstDamageTaken;
          const scoreB = b.bestDamageDealt - b.worstDamageTaken;
          return scoreB - scoreA;
        });

        let html = "";

        sorted.forEach((r, i) => {
          const label = getMemberLabel(r.member);
          let badge = "",
            badgeCls = "";
          const taken = r.worstDamageTaken;
          const dealt = r.bestDamageDealt;

          if (taken === 0) {
            badge = "免疫對手";
            badgeCls = "immune-badge";
          } else if (dealt >= 2 && taken <= 1) {
            badge = "最佳人選";
            badgeCls = "great";
          } else if (dealt >= 2) {
            badge = "可打但危險";
            badgeCls = "ok";
          } else if (taken >= 2) {
            badge = "避免上場";
            badgeCls = "bad";
          } else if (taken < 1) {
            badge = "能擋住";
            badgeCls = "great";
          } else {
            badge = "普通";
            badgeCls = "ok";
          }

          let detailParts = [];
          if (taken === 0) {
            detailParts.push(`免疫對手的 ${oppLabel} 系攻擊`);
          } else if (taken >= 2) {
            detailParts.push(
              `被對手攻擊 <b style="color:#ff6b6b">×${taken}</b> 傷害`,
            );
          } else if (taken < 1) {
            const takenLabel =
              taken === 0.5 ? "½" : taken === 0.25 ? "¼" : taken;
            detailParts.push(`抵抗對手攻擊（×${takenLabel}）`);
          }

          if (dealt >= 2 && r.bestAtkType) {
            detailParts.push(
              `用 ${typeMap[r.bestAtkType].name} 系招式可造成 <b style="color:#51cf66">×${dealt}</b> 傷害`,
            );
          } else if (dealt === 0 && r.bestAtkType) {
            detailParts.push(`自身屬性招式對對手無效`);
          }

          html += `<div class="matchup-member">
      <div class="matchup-member-header">
        <span class="matchup-member-name">${label}</span>
        <span class="matchup-badge ${badgeCls}">${badge}</span>
      </div>
      <div class="matchup-detail">${detailParts.join("<br>")}</div>
    </div>`;
        });

        // Find best STAB-independent counter types
        const oppDefMult = calcDefenseMultipliers(oppTypes);
        const seTypes = TYPES.filter((t) => oppDefMult[t.id] >= 2).map(
          (t) => t.id,
        );

        if (seTypes.length > 0) {
          html += `<div class="matchup-recommend">
      <div class="matchup-recommend-title">對付 ${oppLabel} 系的剋制招式：</div>
      <div class="tags">${seTypes.map((id) => makeTagHtml(id, `×${oppDefMult[id]}`)).join("")}</div>
    </div>`;
        }

        document.getElementById("matchupResult").innerHTML = html;
      }

      document.getElementById("btnAddMember").onclick = addMember;
      document.getElementById("btnTeamClearSel").onclick = () => {
        teamSelected = [];
        teamMoves = [];
        renderTeam();
      };
      document.getElementById("btnClearTeam").onclick = clearTeam;
      document.getElementById("btnAnalyze").onclick = () => {
        analyzeTeam();
      };
      document.getElementById("btnClearOpponent").onclick = () => {
        opponentSelected = [];
        document.getElementById("opponentNameInput").value = "";
        document.getElementById("opponentCard").style.display = "none";
        renderOpponent();
      };

      // ===== Opponent Search & Card =====
      let oppAcActiveIdx = -1;

      function renderOpponentAutocomplete() {
        const input = document.getElementById("opponentNameInput");
        const list = document.getElementById("opponentAutocompleteList");
        const query = input.value.trim();
        if (!query || searchList.length === 0) { list.classList.remove("show"); return; }
        const results = searchPokemon(query);
        if (results.length === 0) { list.classList.remove("show"); return; }
        oppAcActiveIdx = -1;
        list.innerHTML = results.map((p, i) => {
          const typeDots = p.types.map(t =>
            `<span class="ac-type-dot" style="background:${typeMap[t] ? typeMap[t].color : '#666'}"></span>`
          ).join("");
          return `<div class="autocomplete-item" data-idx="${i}">
            <span class="ac-name">${p.nameTW || p.name}</span>
            <span class="ac-name-en">#${p.id} ${p.name}</span>
            <span class="ac-types">${typeDots}</span>
          </div>`;
        }).join("");
        list.classList.add("show");
        list.querySelectorAll(".autocomplete-item").forEach((el) => {
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            selectOpponentPokemon(results[parseInt(el.dataset.idx, 10)]);
          });
        });
      }

      function selectOpponentPokemon(p) {
        const input = document.getElementById("opponentNameInput");
        const list = document.getElementById("opponentAutocompleteList");
        input.value = p.nameTW || p.name;
        list.classList.remove("show");

        // Set opponent types
        opponentSelected = p.types.slice(0, 2);

        // Render opponent card (like team member card)
        renderOpponentCard(p);
        renderOpponent();
      }

      function renderOpponentCard(p) {
        const card = document.getElementById("opponentCard");
        const types = p.types;
        const mult = calcDefenseMultipliers(types);
        const weak4x = [], weak2x = [], resist05 = [], resist025 = [], immune = [];
        TYPES.forEach((t) => {
          const m = mult[t.id];
          if (m === 0) immune.push(t.id);
          else if (m >= 4) weak4x.push(t.id);
          else if (m >= 2) weak2x.push(t.id);
          else if (m <= 0.25) resist025.push(t.id);
          else if (m <= 0.5) resist05.push(t.id);
        });

        const defTag = (id, label) => `<span class="def-tag" style="background:${typeMap[id].color}">${typeMap[id].name}${label}</span>`;
        let defHtml = "";
        if (weak4x.length + weak2x.length > 0) {
          defHtml += `<div class="member-defense"><span class="def-label">弱</span>${weak4x.map(id => defTag(id, "x4")).join("")}${weak2x.map(id => defTag(id, "x2")).join("")}</div>`;
        }
        if (resist025.length + resist05.length > 0) {
          defHtml += `<div class="member-defense"><span class="def-label">抗</span>${resist025.map(id => defTag(id, "x¼")).join("")}${resist05.map(id => defTag(id, "x½")).join("")}</div>`;
        }
        if (immune.length > 0) {
          defHtml += `<div class="member-defense"><span class="def-label">免</span>${immune.map(id => defTag(id, "x0")).join("")}</div>`;
        }

        let statsHtml = "";
        if (p.stats) {
          const s = p.stats;
          const statColor = (v) => v >= 100 ? "#51cf66" : v >= 60 ? "#ffd43b" : "#ff6b6b";
          const statBar = (label, val) =>
            `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-val">${val}</span><div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.min(val / 255 * 100, 100).toFixed(1)}%;background:${statColor(val)}"></div></div></div>`;
          statsHtml = `<div class="member-stats-panel show">
            <div class="stats-total">種族值 ${s.total}</div>
            ${statBar("HP", s.hp)}${statBar("攻擊", s.atk)}${statBar("防禦", s.def)}${statBar("特攻", s.spa)}${statBar("特防", s.spd)}${statBar("速度", s.spe)}
          </div>`;
        }

        card.style.display = "";
        card.innerHTML = `<div class="team-member" style="cursor:default;margin-bottom:12px">
          <div class="member-info" style="flex-direction:column;align-items:flex-start;gap:4px;flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;width:100%">
              <span class="member-name">${p.nameTW || p.name}</span>
              <div class="member-types" style="margin-left:auto">
                ${types.map((id) => `<span class="tag" style="background:${typeMap[id].color}">${typeMap[id].name}</span>`).join("")}
              </div>
            </div>
            ${defHtml}
            ${statsHtml}
          </div>
        </div>`;
      }

      document.getElementById("opponentNameInput").addEventListener("input", renderOpponentAutocomplete);
      document.getElementById("opponentNameInput").addEventListener("focus", renderOpponentAutocomplete);
      document.getElementById("opponentNameInput").addEventListener("blur", () => {
        setTimeout(() => document.getElementById("opponentAutocompleteList").classList.remove("show"), 150);
      });
      document.getElementById("opponentNameInput").addEventListener("keydown", (e) => {
        const list = document.getElementById("opponentAutocompleteList");
        const items = list.querySelectorAll(".autocomplete-item");
        if (!list.classList.contains("show") || items.length === 0) return;
        if (e.key === "ArrowDown") {
          e.preventDefault();
          oppAcActiveIdx = Math.min(oppAcActiveIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle("active", i === oppAcActiveIdx));
          items[oppAcActiveIdx].scrollIntoView({ block: "nearest" });
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          oppAcActiveIdx = Math.max(oppAcActiveIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle("active", i === oppAcActiveIdx));
          items[oppAcActiveIdx].scrollIntoView({ block: "nearest" });
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (oppAcActiveIdx >= 0) items[oppAcActiveIdx].dispatchEvent(new MouseEvent("mousedown"));
          else if (items.length > 0) items[0].dispatchEvent(new MouseEvent("mousedown"));
        } else if (e.key === "Escape") {
          list.classList.remove("show");
        }
      });
      document.getElementById("btnExportTeam").onclick = exportTeamJSON;
      document.getElementById("btnImportTeam").onclick = importTeamJSON;

      // ===== Champions Pokemon Data & Autocomplete =====
      let championsData = [];
      // Build flat search list (base + forms)
      let searchList = [];

      function loadChampionsData() {
        if (typeof CHAMPIONS_DATA !== "undefined" && CHAMPIONS_DATA.pokemon) {
          championsData = CHAMPIONS_DATA.pokemon;
          buildSearchList();
          console.log("Champions data loaded:", championsData.length, "pokemon");
        } else {
          console.warn("Champions data not available");
        }
      }

      function buildSearchList() {
        searchList = [];
        for (const p of championsData) {
          searchList.push({
            id: p.id,
            name: p.name,
            nameTW: p.nameTW,
            types: p.types,
            moveTypes: p.moveTypes,
            stats: p.stats || null,
            label: p.nameTW ? `${p.nameTW}（${p.name}）` : p.name,
          });
          if (p.forms) {
            for (const f of p.forms) {
              searchList.push({
                id: p.id,
                name: f.name,
                nameTW: p.nameTW ? `${p.nameTW}（${f.name}）` : f.name,
                types: f.types,
                moveTypes: f.moveTypes || p.moveTypes,
                stats: f.stats || p.stats || null,
                label: p.nameTW ? `${p.nameTW}（${f.name}）` : f.name,
              });
            }
          }
        }
      }

      function searchPokemon(query) {
        if (!query) return [];
        const q = query.toLowerCase();
        const numQuery = parseInt(q, 10);
        return searchList.filter((p) => {
          if (!isNaN(numQuery) && p.id === numQuery) return true;
          if (p.name.toLowerCase().includes(q)) return true;
          if (p.nameTW && p.nameTW.includes(q)) return true;
          return false;
        }).slice(0, 8);
      }

      let acActiveIdx = -1;

      function renderAutocomplete() {
        const input = document.getElementById("memberNameInput");
        const list = document.getElementById("autocompleteList");
        const query = input.value.trim();

        if (!query || searchList.length === 0) {
          list.classList.remove("show");
          return;
        }

        const results = searchPokemon(query);
        if (results.length === 0) {
          list.classList.remove("show");
          return;
        }

        acActiveIdx = -1;
        list.innerHTML = results.map((p, i) => {
          const typeDots = p.types.map(t =>
            `<span class="ac-type-dot" style="background:${typeMap[t] ? typeMap[t].color : '#666'}"></span>`
          ).join("");
          return `<div class="autocomplete-item" data-idx="${i}">
            <span class="ac-name">${p.nameTW || p.name}</span>
            <span class="ac-name-en">#${p.id} ${p.name}</span>
            <span class="ac-types">${typeDots}</span>
          </div>`;
        }).join("");

        list.classList.add("show");

        // Click handlers
        list.querySelectorAll(".autocomplete-item").forEach((el) => {
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const idx = parseInt(el.dataset.idx, 10);
            selectPokemon(results[idx]);
          });
        });
      }

      let pendingStats = null;

      function selectPokemon(p) {
        const input = document.getElementById("memberNameInput");
        const list = document.getElementById("autocompleteList");

        input.value = p.nameTW || p.name;
        list.classList.remove("show");

        // Auto-fill types
        teamSelected = p.types.slice(0, 2);

        // Auto-fill move types (up to 4)
        teamMoves = (p.moveTypes || []).slice(0, 4);

        // Store stats for when member is added
        pendingStats = p.stats || null;

        renderTeam();
        if (teamSelected.length > 0) {
          document.getElementById("teamMovesSection").style.display = "";
          renderTeamMoves();
        }
      }

      // Input event listeners
      document.getElementById("memberNameInput").addEventListener("input", renderAutocomplete);
      document.getElementById("memberNameInput").addEventListener("focus", renderAutocomplete);
      document.getElementById("memberNameInput").addEventListener("blur", () => {
        setTimeout(() => {
          document.getElementById("autocompleteList").classList.remove("show");
        }, 150);
      });
      document.getElementById("memberNameInput").addEventListener("keydown", (e) => {
        const list = document.getElementById("autocompleteList");
        const items = list.querySelectorAll(".autocomplete-item");
        if (!list.classList.contains("show") || items.length === 0) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle("active", i === acActiveIdx));
          items[acActiveIdx].scrollIntoView({ block: "nearest" });
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          acActiveIdx = Math.max(acActiveIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle("active", i === acActiveIdx));
          items[acActiveIdx].scrollIntoView({ block: "nearest" });
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (acActiveIdx >= 0 && acActiveIdx < items.length) {
            items[acActiveIdx].dispatchEvent(new MouseEvent("mousedown"));
          } else if (items.length > 0) {
            items[0].dispatchEvent(new MouseEvent("mousedown"));
          }
        } else if (e.key === "Escape") {
          list.classList.remove("show");
        }
      });

      loadChampionsData();
      render();
    </script>
  </body>
</html>
